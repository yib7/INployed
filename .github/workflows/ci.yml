name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Windows runner: this is a Windows desktop app (PySide6/Qt dashboard). The
    # Qt UI tests run headless via the offscreen platform plugin (see the test step).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: python -m ruff check .

      # pytest and the smoke test are SEPARATE steps on purpose: in one multi-line
      # PowerShell run block only the LAST command's exit code decides the step, so a
      # pytest failure followed by a passing smoke test went green (this actually
      # happened -- a hung test was killed by the timeout and CI still passed).
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen   # Qt UI tests run headless (no display on CI)
        # The per-test timeout lives in pytest.ini (timeout = 120), so a hung test
        # fails fast with a thread dump everywhere, not just on CI.
        run: python -m pytest -q

      - name: Dashboard smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tests/smoke_qt.py
