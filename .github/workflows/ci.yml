name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Windows runner: this is a Windows desktop app (PySide6/Qt dashboard). The
    # Qt UI tests run headless via the offscreen platform plugin (see the test step).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen   # Qt UI tests run headless (no display on CI)
        run: |
          python -m pytest -q
          python tests/smoke_qt.py
