name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Windows runner: this is a Windows desktop app (PySide6/Qt dashboard). The
    # Qt UI tests run headless via the offscreen platform plugin (see the test step).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen   # Qt UI tests run headless (no display on CI)
        run: |
          # --timeout: a hung test fails fast with a thread dump instead of burning
          # the 6-hour job ceiling (the suite itself runs in well under a minute).
          python -m pytest -q --timeout=120 --timeout-method=thread
          python tests/smoke_qt.py
