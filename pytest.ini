[pytest]
# Suite-wide hang guard: a stuck test (e.g. an unmocked modal dialog) fails fast
# with a thread dump instead of blocking the run forever, in EVERY environment
# (dev machine, fresh clone, CI) -- not only where a --timeout flag is remembered.
timeout = 120
timeout_method = thread
filterwarnings =
    ignore::DeprecationWarning:google.genai.types
